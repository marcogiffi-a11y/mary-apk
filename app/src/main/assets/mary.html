<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mary</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0a0805;font-family:Georgia,serif;display:flex;flex-direction:column;align-items:center;color:#f2ead6;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,#1c1608,#0a0805 68%);pointer-events:none;z-index:0}
.wrap{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;min-height:100vh;position:relative;z-index:1}
.header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:28px 24px 0}
.logo{font-size:28px;font-weight:400;letter-spacing:9px;color:#d8b84a}
.sub{font-size:9px;letter-spacing:4px;color:#b9a463;margin-top:3px;font-family:monospace}
.date{font-size:10px;color:#8f7f52;letter-spacing:2px}
.btn-cfg{background:none;border:1px solid #b9a463;border-radius:8px;padding:5px 9px;color:#d8b84a;cursor:pointer;font-size:15px}
.orb-wrap{position:relative;width:280px;height:240px;display:flex;align-items:center;justify-content:center;margin-top:10px}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(216,184,74,.28);animation:pulse 3s ease-in-out infinite}
.ring:nth-child(1){width:160px;height:160px;background:radial-gradient(circle,rgba(216,184,74,.18),transparent 70%);box-shadow:0 0 40px rgba(216,184,74,.3)}
.ring:nth-child(2){width:210px;height:210px;animation-delay:.5s;border-color:rgba(216,184,74,.16)}
.ring:nth-child(3){width:260px;height:260px;animation-delay:1s;border-color:rgba(216,184,74,.08)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.mic-btn{width:80px;height:80px;border-radius:50%;cursor:pointer;border:1px solid #d8b84a;font-size:30px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 40% 35%,#2a2010,#0a0805);box-shadow:0 0 30px rgba(216,184,74,.5);transition:all .3s;z-index:2;position:relative}
.mic-btn.listening{background:linear-gradient(135deg,#e8cf6a,#b8902a);box-shadow:0 0 50px rgba(216,184,74,.8)}
.mic-btn.speaking{background:linear-gradient(135deg,#e8a030,#d8b84a)}
.status{font-size:13px;color:#f2ead6;font-style:italic;margin:14px 0;text-align:center;min-height:20px;letter-spacing:.5px}
.messages{width:100%;padding:0 16px;flex:1;display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 490px);min-height:60px;overflow-y:auto}
.msg{max-width:82%;padding:11px 14px;font-size:14px;line-height:1.5}
.msg.user{align-self:flex-end;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px 4px 16px 16px}
.msg.mary{align-self:flex-start;background:rgba(216,184,74,.10);border:1px solid rgba(216,184,74,.35);border-radius:4px 16px 16px 16px}
.msg-label{font-size:9px;color:#d8b84a;letter-spacing:2px;margin-bottom:4px;font-family:monospace}
.empty{text-align:center;color:#8f7f52;font-size:13px;margin-top:20px}
.input-row{width:100%;padding:12px 16px 20px;display:flex;gap:8px}
.input-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(216,184,74,.3);border-radius:21px;padding:12px 18px;color:#f2ead6;font-size:14px;outline:none;font-family:Georgia,serif}
.input-row input::placeholder{color:#8f7f52}
.send-btn{background:linear-gradient(135deg,#b8902a,#d8b84a);border:none;border-radius:50%;width:50px;height:50px;color:#0a0805;cursor:pointer;font-size:18px;flex-shrink:0}
.send-btn:disabled{background:#2a2210;color:#8f7f52;cursor:default}
/* Panel */
.panel{position:fixed;bottom:0;left:0;right:0;background:#100d08;border-top:1px solid rgba(216,184,74,.3);padding:20px;z-index:100;display:none;max-height:70vh;overflow-y:auto}
.panel.open{display:block}
.panel h3{color:#d8b84a;font-size:11px;letter-spacing:3px;margin-bottom:12px;font-family:monospace}
.panel p{color:#8f7f52;font-size:12px;margin-bottom:14px;line-height:1.5}
.scan-btn{background:linear-gradient(135deg,#b8902a,#d8b84a);border:none;border-radius:8px;padding:12px 20px;color:#0a0805;cursor:pointer;font-size:13px;font-weight:bold;width:100%;margin-bottom:14px}
.device-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(216,184,74,.06);border:1px solid rgba(216,184,74,.2);border-radius:8px;margin-bottom:8px}
.device-name{color:#f2ead6;font-size:13px}
.device-ip{color:#b9a463;font-size:11px;font-family:monospace}
.device-status{font-size:10px;padding:3px 8px;border-radius:10px}
.device-status.ok{background:rgba(80,200,80,.15);color:#80d080;border:1px solid rgba(80,200,80,.3)}
.device-status.nok{background:rgba(200,80,80,.15);color:#d08080;border:1px solid rgba(200,80,80,.3)}
.scan-progress{color:#b9a463;font-size:12px;text-align:center;padding:8px;font-family:monospace}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="header">
    <div>
      <div class="logo">MARY</div>
      <div class="sub">ATHENA · NEXT GEN · AI</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="date" id="dateEl"></div>
      <button class="btn-cfg" onclick="togglePanel()">⚙️</button>
    </div>
  </div>

  <div class="orb-wrap">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  </div>

  <div class="status" id="status">Ciao! Sono Mary</div>

  <div class="messages" id="messages">
    <div class="empty">Premi il microfono e parla con Mary</div>
  </div>

  <div class="input-row">
    <input id="textInput" placeholder="Scrivi o parla con Mary…" onkeydown="if(event.key==='Enter')sendText()">
    <button class="send-btn" id="sendBtn" onclick="sendText()">➤</button>
  </div>
</div>

<!-- Panel dispositivi Shelly -->
<div class="panel" id="panel">
  <h3>DISPOSITIVI SHELLY</h3>
  <p>Premi "Scansiona" per trovare automaticamente gli Shelly sulla tua rete WiFi di casa.</p>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <input id="subnetInput" placeholder="Subnet (es. 192.168.1)" style="flex:1;background:#1a1508;border:1px solid rgba(216,184,74,.3);border-radius:8px;padding:8px 12px;color:#f2ead6;font-size:13px;outline:none">
  </div>
  <button class="scan-btn" onclick="scanNetwork()">🔍 SCANSIONA RETE</button>
  <div id="scanProgress"></div>
  <div id="deviceList"></div>
</div>

<script>
const VERCEL = 'https://mary-assistant.vercel.app'
let messages = [], keepListening = false, recognition = null
let shellyMap = {} // nome → {ip, type}

// Carica dispositivi salvati
try { shellyMap = JSON.parse(localStorage.getItem('shelly_map') || '{}') } catch {}

document.getElementById('dateEl').textContent = new Date()
  .toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'}).toUpperCase()

// ── Scansione rete ────────────────────────────────────────────────────────────
async function scanNetwork() {
  const prog = document.getElementById('scanProgress')
  const list = document.getElementById('deviceList')
  list.innerHTML = ''

  // Prendi subnet da input manuale o prova quelli comuni
  const manualSubnet = document.getElementById('subnetInput').value.trim()
  const subnets = manualSubnet
    ? [manualSubnet]
    : ['192.168.1','192.168.0','192.168.2','192.168.100','10.0.0','10.0.1','172.16.0','172.16.1']
  const found = []

  for (const subnet of subnets) {
    prog.textContent = `Scansiono ${subnet}.x...`
    for (let start = 1; start <= 254; start += 40) {
      const batch = []
      for (let i = start; i < Math.min(start+40, 255); i++) {
        batch.push(checkShelly(`${subnet}.${i}`))
      }
      const results = await Promise.allSettled(batch)
      results.forEach(r => { if (r.status==='fulfilled' && r.value) found.push(r.value) })
      prog.textContent = `${subnet}.x — IP ${Math.min(start+39,254)}/254 — trovati: ${found.length}`
    }
    if (found.length > 0) break
  }

  if (found.length === 0) {
    prog.innerHTML = 'Nessun Shelly trovato.<br><small>Prova ad inserire il subnet del tuo router qui sopra (es. 192.168.1)</small>'
    return
  }

  prog.textContent = '✓ Trovati '+found.length+' dispositivi Shelly!'
  const newMap = {}
  found.forEach(d => {
    newMap[d.name] = { ip: d.ip, type: d.type }
    list.innerHTML += `<div class="device-item"><div><div class="device-name">${d.name}</div><div class="device-ip">${d.ip} · ${d.type}</div></div><span class="device-status ok">TROVATO</span></div>`
  })
  shellyMap = newMap
  try { localStorage.setItem('shelly_map', JSON.stringify(shellyMap)) } catch {}
}

async function checkShelly(ip) {
  // Prova Gen1 (/shelly) e Gen2 (/rpc/Shelly.GetDeviceInfo)
  try {
    // Gen 1
    const c1 = new AbortController()
    const t1 = setTimeout(() => c1.abort(), 1200)
    const r1 = await fetch(`http://${ip}/shelly`, { signal: c1.signal })
    clearTimeout(t1)
    if (r1.ok) {
      const d1 = await r1.json()
      try {
        const s1 = await fetch(`http://${ip}/settings`)
        const st = await s1.json()
        const name = st.name || d1.hostname || `Shelly-${ip}`
        const isR = (d1.type||'').includes('25') || (d1.type||'').includes('2PM') || (st.rollers||[]).length>0
        return { ip, name, type: isR?'roller':'relay' }
      } catch {
        return { ip, name: d1.hostname || `Shelly-${ip}`, type:'relay' }
      }
    }
  } catch {}
  try {
    // Gen 2
    const c2 = new AbortController()
    const t2 = setTimeout(() => c2.abort(), 1200)
    const r2 = await fetch(`http://${ip}/rpc/Shelly.GetDeviceInfo`, { signal: c2.signal })
    clearTimeout(t2)
    if (r2.ok) {
      const d2 = await r2.json()
      const name = d2.name || d2.id || `Shelly-${ip}`
      const isCover = (d2.profile||'').includes('cover') || (d2.model||'').includes('2PM')
      return { ip, name, type: isCover?'roller':'relay' }
    }
  } catch {}
  return null
}

// ── Controllo Shelly ──────────────────────────────────────────────────────────
async function execShelly(reply) {
  try {
    const m = reply.match(/SHELLY_CMD:(\{[^}]+\})/)
    if (!m) return
    const cmd = JSON.parse(m[1])
    const devKey = Object.keys(shellyMap).find(k =>
      k.toLowerCase().includes(cmd.deviceName.toLowerCase()) ||
      cmd.deviceName.toLowerCase().includes(k.toLowerCase())
    )
    if (!devKey) {
      setStatus('IP non trovato per: '+cmd.deviceName+' — apri ⚙️ e scansiona la rete')
      return
    }
    const dev = shellyMap[devKey]
    setStatus('Controllo '+devKey+'...')
    const url = dev.type==='roller'
      ? `http://${dev.ip}/roller/0?go=${cmd.command}`
      : `http://${dev.ip}/relay/0?turn=${cmd.command}`
    await fetch(url)
    setStatus('✓ '+devKey+': '+cmd.command)
  } catch(e) { setStatus('Errore Shelly: '+e.message) }
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function speak(text) {
  try {
    if (!window.speechSynthesis) return
    window.speechSynthesis.cancel()
    const clean = text.replace(/SHELLY_CMD:\{[^}]*\}/g,'').trim()
    const u = new SpeechSynthesisUtterance(clean)
    u.lang='it-IT'; u.rate=1.0; u.pitch=1.0
    const saved = localStorage.getItem('mary_voice')
    const vv = window.speechSynthesis.getVoices()
    const v = (saved && vv.find(x=>x.name===saved)) || vv.find(x=>x.lang.startsWith('it'))
    if (v) u.voice = v
    u.onstart = () => setMicState('speaking')
    u.onend = () => { setMicState('idle'); setStatus('Mary pronta') }
    window.speechSynthesis.speak(u)
  } catch {}
}

// ── Mic ───────────────────────────────────────────────────────────────────────
// ── Callback dal SpeechRecognizer nativo Android ────────────────────────────
function onMicReady() { setMicState('listening'); setStatus('Ti sto ascoltando...') }
function onSpeechResult(text) { sendMessage(text) }
function onMicStopped() { setMicState('idle'); setStatus('Mary pronta') }
function onMicError(code) {
  setMicState('idle')
  if (code===7) setStatus('Nessun parlato rilevato — ripremi per riprovare')
  else setStatus('Errore microfono ('+code+')')
}

function toggleMic() {
  if (window.MicBridge) {
    // Usa il ponte nativo Android
    if (document.getElementById('micBtn').classList.contains('listening')) {
      MicBridge.stopListening()
    } else {
      setMicState('listening'); setStatus('Avvio microfono...')
      MicBridge.startListening()
    }
    return
  }
  // Fallback Web Speech API (browser)
  if (keepListening) {
    keepListening = false
    try { recognition && recognition.stop() } catch {}
    setMicState('idle'); setStatus('Mary pronta'); return
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  if (!SR) { setStatus('Microfono non supportato'); return }
  keepListening = true; setMicState('listening'); setStatus('Ti sto ascoltando...')
  function start() {
    try {
      const r = new SR()
      r.lang='it-IT'; r.continuous=false; r.interimResults=false
      r.onresult = e => sendMessage(e.results[e.results.length-1][0].transcript)
      r.onerror = e => {
        if (e.error==='no-speech' && keepListening) setTimeout(start,200)
        else if (e.error!=='aborted') { keepListening=false; setMicState('idle'); setStatus('Errore mic') }
      }
      r.onend = () => { if (keepListening) setTimeout(start,200) }
      recognition=r; r.start()
    } catch(e) { keepListening=false; setMicState('idle'); setStatus('Errore: '+e.message) }
  }
  start()
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function sendText() {
  const v=document.getElementById('textInput').value.trim()
  if(v){document.getElementById('textInput').value='';sendMessage(v)}
}

async function sendMessage(text) {
  addMsg('user',text); setStatus('Mary sta pensando...')
  document.getElementById('sendBtn').disabled=true
  try {
    messages.push({role:'user',content:text})
    const res = await fetch(VERCEL+'/api/chat',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages})
    })
    const data = await res.json()
    const reply = data.reply || 'Errore'
    messages.push({role:'assistant',content:reply})
    addMsg('mary', reply.replace(/SHELLY_CMD:\{[^}]*\}/g,'').trim())
    speak(reply)
    if (reply.includes('SHELLY_CMD:')) execShelly(reply)
  } catch(e) { addMsg('mary','Errore: '+e.message) }
  document.getElementById('sendBtn').disabled=false
  if (!keepListening) setStatus('Mary pronta')
}

// ── UI ────────────────────────────────────────────────────────────────────────
function addMsg(role,text) {
  const c=document.getElementById('messages')
  const e=c.querySelector('.empty'); if(e) e.remove()
  const d=document.createElement('div'); d.className='msg '+role
  d.innerHTML=role==='mary'?`<div class="msg-label">MARY</div>${text}`:text
  c.appendChild(d); d.scrollIntoView({behavior:'smooth'})
}
function setStatus(s){document.getElementById('status').textContent=s}
function setMicState(s){
  const b=document.getElementById('micBtn')
  b.className='mic-btn'+(s!=='idle'?' '+s:'')
  b.textContent=s==='listening'?'🎙️':s==='speaking'?'🔊':'🎤'
}
function togglePanel(){document.getElementById('panel').classList.toggle('open')}

// Mostra dispositivi già salvati all'apertura
const saved=Object.keys(shellyMap)
if(saved.length>0){
  const list=document.getElementById('deviceList')
  const prog=document.getElementById('scanProgress')
  prog.textContent='✓ '+saved.length+' dispositivi dalla sessione precedente'
  saved.forEach(k=>{
    list.innerHTML+=`<div class="device-item"><div><div class="device-name">${k}</div><div class="device-ip">${shellyMap[k].ip} · ${shellyMap[k].type}</div></div><span class="device-status ok">SALVATO</span></div>`
  })
}
</script>
</body>
</html>
