name: Build Mary APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup SDK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
      - name: Build APK
        run: gradle assembleDebug --no-daemon
      - name: Create Release v3
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0
          name: "Mary App v3.0 - Shelly Auto-Scan"
          body: "Rilevamento automatico Shelly, HTML standalone, icona oro"
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
          fail_on_unmatched_files: true
